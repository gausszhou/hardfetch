run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - revive

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: fe-cli
  revive:
    rules:
      - name: exported
      - name: package-comments

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - goconst
        - gocyclo
        - funlen

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true